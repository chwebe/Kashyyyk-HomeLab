---
- name: Update system packages
  ansible.builtin.include_role:
    name: system_update

- name: Install package families (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ item.packages }}"
    state: present
  loop:
    - { packages: "{{ admin_packages_essential }}", enabled: "{{ admin_packages_install_essential }}" }
    - { packages: "{{ admin_packages_development }}", enabled: "{{ admin_packages_install_development }}" }
    - { packages: "{{ admin_packages_monitoring }}", enabled: "{{ admin_packages_install_monitoring }}" }
    - { packages: "{{ admin_packages_network }}", enabled: "{{ admin_packages_install_network }}" }
    - { packages: "{{ admin_packages_archive }}", enabled: "{{ admin_packages_install_archive }}" }
    - { packages: "{{ admin_packages_sync }}", enabled: "{{ admin_packages_install_sync }}" }
  when:
    - ansible_os_family == "Debian"
    - item.enabled | bool

- name: Install package families (RedHat/CentOS)
  ansible.builtin.dnf:
    name: "{{ item.packages }}"
    state: present
  loop:
    - { packages: "{{ admin_packages_essential }}", enabled: "{{ admin_packages_install_essential }}" }
    - { packages: "{{ admin_packages_development }}", enabled: "{{ admin_packages_install_development }}" }
    - { packages: "{{ admin_packages_monitoring }}", enabled: "{{ admin_packages_install_monitoring }}" }
    - { packages: "{{ admin_packages_network }}", enabled: "{{ admin_packages_install_network }}" }
    - { packages: "{{ admin_packages_archive }}", enabled: "{{ admin_packages_install_archive }}" }
    - { packages: "{{ admin_packages_sync }}", enabled: "{{ admin_packages_install_sync }}" }
  when:
    - ansible_os_family == "RedHat"
    - item.enabled | bool
