---
- name: Update system packages
  include_role:
    name: system_update

- name: Install package families (Debian/Ubuntu)
  apt:
    name: "{{ item.packages }}"
    state: present
  loop:
    - { packages: "{{ essential_packages }}", enabled: "{{ install_essential_packages }}" }
    - { packages: "{{ development_packages }}", enabled: "{{ install_development_packages }}" }
    - { packages: "{{ monitoring_packages }}", enabled: "{{ install_monitoring_packages }}" }
    - { packages: "{{ network_packages }}", enabled: "{{ install_network_packages }}" }
    - { packages: "{{ archive_packages }}", enabled: "{{ install_archive_packages }}" }
    - { packages: "{{ sync_packages }}", enabled: "{{ install_sync_packages }}" }
  when:
    - ansible_os_family == "Debian"
    - item.enabled | bool

- name: Install package families (RedHat/CentOS)
  yum:
    name: "{{ item.packages }}"
    state: present
  loop:
    - { packages: "{{ essential_packages }}", enabled: "{{ install_essential_packages }}" }
    - { packages: "{{ development_packages }}", enabled: "{{ install_development_packages }}" }
    - { packages: "{{ monitoring_packages }}", enabled: "{{ install_monitoring_packages }}" }
    - { packages: "{{ network_packages }}", enabled: "{{ install_network_packages }}" }
    - { packages: "{{ archive_packages }}", enabled: "{{ install_archive_packages }}" }
    - { packages: "{{ sync_packages }}", enabled: "{{ install_sync_packages }}" }
  when:
    - ansible_os_family == "RedHat"
    - item.enabled | bool
