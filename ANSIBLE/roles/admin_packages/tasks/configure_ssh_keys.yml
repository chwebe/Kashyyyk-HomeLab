---
- name: ADMIN PACKAGES | Ensure SSH client is installed (Debian/Ubuntu)
  ansible.builtin.apt:
    name: openssh-client
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: ADMIN PACKAGES | Ensure SSH client is installed (RedHat/CentOS)
  ansible.builtin.dnf:
    name: openssh-clients
    state: present
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: ADMIN PACKAGES | Ensure .ssh directory exists with correct permissions
  ansible.builtin.file:
    path: "~{{ ansible_user }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: ADMIN PACKAGES | Set correct permissions on SSH private keys
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0600'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop: "{{ admin_packages_ssh_keys }}"
  become: true
  failed_when: false

- name: ADMIN PACKAGES | Set correct permissions on SSH public keys
  ansible.builtin.file:
    path: "{{ item }}.pub"
    mode: '0644'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop: "{{ admin_packages_ssh_keys }}"
  become: true
  failed_when: false

- name: ADMIN PACKAGES | Configure SSH config for automatic key loading
  ansible.builtin.blockinfile:
    path: "~{{ ansible_user }}/.ssh/config"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - SSH KEY AUTO-LOADING"
    block: |
      Host *
          AddKeysToAgent yes
      {% for key in admin_packages_ssh_keys %}
          IdentityFile {{ key }}
      {% endfor %}
    state: present
    create: true
    mode: '0600'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true
