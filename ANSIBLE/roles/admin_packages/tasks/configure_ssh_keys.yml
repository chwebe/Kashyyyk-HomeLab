---
- name: ADMIN PACKAGES | Ensure SSH client is installed (Debian/Ubuntu)
  ansible.builtin.apt:
    name: openssh-client
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: ADMIN PACKAGES | Ensure SSH client is installed (RedHat/CentOS)
  ansible.builtin.dnf:
    name: openssh-clients
    state: present
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: ADMIN PACKAGES | Ensure .ssh directory exists with correct permissions
  ansible.builtin.file:
    path: "~{{ ansible_user }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: ADMIN PACKAGES | Set correct permissions on SSH private keys
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0600'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop: "{{ admin_packages_ssh_keys }}"
  become: true
  failed_when: false

- name: ADMIN PACKAGES | Set correct permissions on SSH public keys
  ansible.builtin.file:
    path: "{{ item }}.pub"
    mode: '0644'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop: "{{ admin_packages_ssh_keys }}"
  become: true
  failed_when: false

- name: ADMIN PACKAGES | Add SSH key auto-loading to .zshrc
  ansible.builtin.blockinfile:
    path: "~{{ ansible_user }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - SSH KEY AUTO-LOADING"
    block: |
      # Auto-load SSH keys
      if [ -z "$SSH_AUTH_SOCK" ]; then
        eval "$(ssh-agent -s)" > /dev/null
      {% for key in admin_packages_ssh_keys %}
        ssh-add {{ key }} 2>/dev/null
      {% endfor %}
      fi
    state: present
    create: true
  become: true
  become_user: "{{ ansible_user }}"

- name: ADMIN PACKAGES | Add SSH key auto-loading to .bashrc
  ansible.builtin.blockinfile:
    path: "~{{ ansible_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - SSH KEY AUTO-LOADING"
    block: |
      # Auto-load SSH keys
      if [ -z "$SSH_AUTH_SOCK" ]; then
        eval "$(ssh-agent -s)" > /dev/null
      {% for key in admin_packages_ssh_keys %}
        ssh-add {{ key }} 2>/dev/null
      {% endfor %}
      fi
    state: present
    create: true
  become: true
  become_user: "{{ ansible_user }}"
