- block:
  - name: SYSTEM UPDATE | Run "apt update"
    become: true
    ansible.builtin.apt:
      update_cache: yes
      cache_valid_time: 3600

  - name: SYSTEM UPDATE | Run "apt upgrade"
    become: true
    ansible.builtin.apt:
      upgrade: dist
  when: ansible_facts['os_family'] == "Debian"

- block:
  - name: SYSTEM UPDATE | Run "yum update"
    ansible.builtin.yum:
      update_cache: yes

  - name: SYSTEM UPDATE | Run "yum upgrade"
    ansible.builtin.yum:
      name: '*'
      state: latest
  when: ansible_facts['os_family'] == 'RedHat'
