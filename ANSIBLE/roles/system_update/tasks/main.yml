- name: Run "apt update"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Run "apt upgrade"
  ansible.builtin.apt:
    upgrade: dist
  when: ansible_os_family == 'Debian'

- name: Run "yum update"
  ansible.builtin.yum:
    update_cache: yes
  when: ansible_os_family == 'RedHat'

- name: Run "yum upgrade"
  ansible.builtin.yum:
    name: '*'
    state: latest
  when: ansible_os_family == 'RedHat'
